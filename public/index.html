<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JSON Schema Table</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container-fluid py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h1 id="table-title" class="h3 m-0">Table</h1>
      <div class="d-flex gap-2 align-items-center">
        <label class="form-label m-0 me-2">Mode</label>
        <select id="mode-select" class="form-select form-select-sm" style="width: 150px;">
          <option value="server">Server</option>
          <option value="client">Client</option>
        </select>
      </div>
    </div>

    <div id="filters-container" class="card card-body mb-3"></div>

    <div class="card">
      <div class="table-responsive">
        <table id="data-table" class="table table-sm table-hover align-middle mb-0">
          <thead class="table-light" id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <div class="card-footer d-flex flex-wrap align-items-center justify-content-between gap-2">
        <div class="d-flex align-items-center gap-2">
          <button id="prev-page" class="btn btn-outline-secondary btn-sm">Prev</button>
          <div>
            <span id="page-info">Page 1 of 1</span>
          </div>
          <button id="next-page" class="btn btn-outline-secondary btn-sm">Next</button>
        </div>
        <div class="d-flex align-items-center gap-2">
          <label for="page-size" class="form-label m-0">Rows per page</label>
          <select id="page-size" class="form-select form-select-sm" style="width: 100px;"></select>
        </div>
      </div>
    </div>

    <div id="bulk-actions" class="sticky-actions card card-body mt-3 d-flex flex-wrap gap-2"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
