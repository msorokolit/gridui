<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>JSON Schema Table - Demos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="container py-5">
    <h1 class="mb-4">JSON Schema Table</h1>
    <p class="text-muted">Choose a demo. Client mode works on static hosting (GitHub Pages). Server mode requires a backend.</p>
    <div class="row g-3">
      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-body">
            <h2 class="h5">Server Mode</h2>
            <p class="mb-3">Filtering, sorting, pagination performed on the server.</p>
            <a class="btn btn-primary" href="./server.html">Open Server Demo</a>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-body">
            <h2 class="h5">Client Mode</h2>
            <p class="mb-3">Fetch all data; process in browser.</p>
            <a class="btn btn-primary" href="./client.html">Open Client Demo</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
