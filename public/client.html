<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Client Mode Demo - JSON Schema Table</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="container py-4">
    <h1 class="h3 mb-3">Client Mode Demo</h1>
    <p class="text-muted">Full dataset fetched once. Filtering, sorting, and pagination executed in the browser.</p>
    <div id="client-demo-root"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./lib/json-schema-table.js"></script>
  <script>
    (function(){
      // Provide static schema and data provider for GitHub Pages
      const schema = {
        title: 'Users',
        columns: [
          { field: 'id', label: 'ID', type: 'number', sortable: true, filter: { type: 'numberRange' } },
          { field: 'name', label: 'Name', type: 'string', sortable: true, filter: { type: 'text' } },
          { field: 'email', label: 'Email', type: 'string', sortable: true, filter: { type: 'text' } },
          { field: 'role', label: 'Role', type: 'enum', options: ['Admin','User','Manager'], sortable: true, filter: { type: 'select', multiple: true } },
          { field: 'active', label: 'Active', type: 'boolean', sortable: true, filter: { type: 'boolean' } },
          { field: 'createdAt', label: 'Created At', type: 'date', sortable: true, filter: { type: 'dateRange' }, format: 'yyyy-MM-dd' }
        ],
        rowActions: [ { name: 'view', label: 'View' } ],
        bulkActions: [ { name: 'export', label: 'Export CSV' } ],
        defaultPageSize: 10,
        allowedPageSizes: [10, 25, 50, 100]
      };

      // Example static data set (generate 300 rows deterministically)
      function generateData(count){
        const firstNames = ['Alice','Bob','Carol','Dave','Eve','Frank','Grace','Heidi','Ivan','Judy','Mallory','Niaj','Olivia','Peggy','Rupert','Sybil','Trent','Victor','Wendy','Yvonne','Zara'];
        const lastNames = ['Smith','Johnson','Williams','Jones','Brown','Davis','Miller','Wilson','Moore','Taylor'];
        const roles = ['Admin','User','Manager'];
        const rows = [];
        const startDate = new Date();
        startDate.setFullYear(startDate.getFullYear() - 3);
        for (let i = 1; i <= count; i++) {
          const first = firstNames[i % firstNames.length];
          const last = lastNames[i % lastNames.length];
          const name = first + ' ' + last;
          const email = `${first.toLowerCase()}.${last.toLowerCase()}${i}@example.com`;
          const role = roles[i % roles.length];
          const active = i % 4 !== 0;
          const createdAt = new Date(startDate.getTime() + (i * 8640000) % (Date.now() - startDate.getTime())).toISOString();
          rows.push({ id: i, name, email, role, active, createdAt });
        }
        return rows;
      }
      const items = generateData(300);

      const root = document.getElementById('client-demo-root');
      const table = new JsonSchemaTable(root, {
        mode: 'client',
        schema,
        clientItems: items,
        actionsBaseUrl: null,
        rowActionHandler: async (actionDef, ids, ctx) => {
          if (actionDef?.name === 'view') {
            const found = items.find(r => r.id === ids[0]);
            alert(JSON.stringify(found, null, 2));
            return { ok: true };
          }
          return { ok: true };
        }
      });
      table.init();
    })();
  </script>
</body>
</html>
