<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Server Mode Demo - JSON Schema Table</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="container py-4">
    <h1 class="h3 mb-3">Server Mode Demo</h1>
    <p class="text-muted">Filtering, sorting, and pagination executed on the server.</p>
    <div id="server-demo-root"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./lib/json-schema-table.js"></script>
  <script>
    (async function(){
      const root = document.getElementById('server-demo-root');
      const table = new JsonSchemaTable(root, { mode: 'server' });
      await table.init();
    })();
  </script>
</body>
</html>
